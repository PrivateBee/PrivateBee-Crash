name: "CI Quality - Java"

on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string

permissions:
  contents: read

# ==========================================================
# MODIFIER ICI le dossier source Java
# Exemple:
#   JAVA_DIR: src
# Si le projet Java contient plusieurs packages sous src/,
# il faut généralement laisser: JAVA_DIR: src
# ==========================================================
env:
  JAVA_DIR: .

jobs:
  quality-java:
    name: "Java Quality on ${{ matrix.label }}"
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Detect Java files (Unix)
        if: runner.os != 'Windows'
        id: javacheck_unix
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$JAVA_DIR" ] && find "$JAVA_DIR" -type f -name "*.java" | grep -q .; then
            echo "has_java=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_java=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Java files (Windows)
        if: runner.os == 'Windows'
        id: javacheck_windows
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path $env:JAVA_DIR) {
            $files = Get-ChildItem $env:JAVA_DIR -Recurse -File -Include *.java -ErrorAction SilentlyContinue
          } else {
            $files = @()
          }
          if ($files.Count -gt 0) {
            "has_java=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "has_java=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - uses: actions/setup-java@v4
        if: steps.javacheck_unix.outputs.has_java == 'true' || steps.javacheck_windows.outputs.has_java == 'true'
        with:
          distribution: temurin
          java-version: "17"

      - name: Compile all Java (Unix)
        if: steps.javacheck_unix.outputs.has_java == 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          mapfile -t JAVA_FILES < <(find "$JAVA_DIR" -type f -name "*.java")
          if [ "${#JAVA_FILES[@]}" -eq 0 ]; then
            echo "No Java files -> skipping"
            exit 0
          fi
          javac -d out "${JAVA_FILES[@]}"

      - name: Compile all Java (Windows)
        if: steps.javacheck_windows.outputs.has_java == 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path out | Out-Null
          if (Test-Path $env:JAVA_DIR) {
            $files = Get-ChildItem $env:JAVA_DIR -Recurse -File -Include *.java -ErrorAction SilentlyContinue
          } else {
            $files = @()
          }
          $paths = $files | ForEach-Object { $_.FullName }
          if ($paths.Count -eq 0) {
            Write-Host "No Java files -> skipping"
            exit 0
          }
          & javac -d out $paths

      - name: Java skipped
        if: steps.javacheck_unix.outputs.has_java != 'true' && steps.javacheck_windows.outputs.has_java != 'true'
        run: echo "No Java files -> skipping"
